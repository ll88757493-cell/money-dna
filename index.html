<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>財富DNA測驗</title>
  <style>
    body {
      margin: 0;
      font-family: "Noto Sans TC", Arial, sans-serif;
      background: #f6f2e9;
      color: #1f2933;
    }
    .container {
      max-width: 720px;
      margin: auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    h1, h2 {
      margin-top: 0;
    }
    .subtitle {
      color: #6b7280;
      line-height: 1.7;
    }
    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #1f2933;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 16px;
    }
    button:hover {
      background: #374151;
    }
    .option {
      display: block;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 14px;
      margin: 12px 0;
      cursor: pointer;
      background: #fafafa;
    }
    .option input {
      margin-right: 8px;
    }
    input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 14px;
      margin: 8px 0 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }
    .hidden {
      display: none;
    }
    .badge {
      display: inline-block;
      background: #efe6d6;
      color: #7c4a03;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .result-box {
      background: #f9fafb;
      border-left: 5px solid #1f2933;
      padding: 18px;
      border-radius: 12px;
      line-height: 1.8;
    }
  </style>
</head>

<body>
  <div class="container">

    <div id="start" class="card">
      <span class="badge">Money Mirror 財富覺察計畫</span>
      <h1>財富DNA測驗</h1>
      <p class="subtitle">
        這不是考試，也沒有標準答案。<br>
        透過 16 題問題，幫助你看見自己的金錢模式、財務優勢與可能盲點。
      </p>
      <button onclick="startQuiz()">開始測驗</button>
    </div>

    <div id="quiz" class="card hidden">
      <h2 id="questionTitle"></h2>
      <div id="options"></div>
      <button onclick="nextQuestion()">下一題</button>
    </div>

    <div id="leadForm" class="card hidden">
      <h2>測驗完成</h2>
      <p class="subtitle">留下資料後，即可查看你的財富DNA結果。</p>

      <label>姓名</label>
      <input type="text" id="name" placeholder="請輸入姓名">

      <label>LINE ID</label>
      <input type="text" id="line" placeholder="請輸入 LINE ID">

      <label>電話</label>
      <input type="tel" id="phone" placeholder="請輸入電話">

      <button onclick="showResult()">查看結果</button>
    </div>

    <div id="result" class="card hidden">
      <span class="badge">你的財富DNA</span>
      <h1 id="resultTitle"></h1>
      <div class="result-box" id="resultContent"></div>

      <button onclick="bookConsult()">預約免費 60 分鐘財富導航會談</button>
    </div>

  </div>

<script>
const questions = [
  {
    q: "1. 如果今天突然收到 100 萬元，你第一個想法是？",
    options: [
      { text: "A. 存起來，留著未來用", type: "A" },
      { text: "B. 投資，讓它繼續增值", type: "B" },
      { text: "C. 完成一直想做的夢想或旅行", type: "C" },
      { text: "D. 先規劃，再決定怎麼分配", type: "D" }
    ]
  },
  {
    q: "2. 面對投資，你通常會？",
    options: [
      { text: "A. 覺得有風險，先不要碰", type: "A" },
      { text: "B. 做足研究再投資", type: "B" },
      { text: "C. 覺得有機會就試試看", type: "C" },
      { text: "D. 找值得信任的人一起討論", type: "D" }
    ]
  },
  {
    q: "3. 月底如果還剩一筆錢，你通常會？",
    options: [
      { text: "A. 放進存款", type: "A" },
      { text: "B. 投資", type: "B" },
      { text: "C. 花掉犒賞自己", type: "C" },
      { text: "D. 留一部分、投資一部分", type: "D" }
    ]
  },
  {
    q: "4. 你認為最大的財務風險是？",
    options: [
      { text: "A. 沒有存款", type: "A" },
      { text: "B. 不懂投資", type: "B" },
      { text: "C. 沒有享受人生", type: "C" },
      { text: "D. 沒有做好規劃", type: "D" }
    ]
  },
  {
    q: "5. 如果收入增加一倍，你最可能？",
    options: [
      { text: "A. 存更多", type: "A" },
      { text: "B. 投資更多", type: "B" },
      { text: "C. 提升生活品質", type: "C" },
      { text: "D. 開始規劃退休或財務自由", type: "D" }
    ]
  },
  {
    q: "6. 你多久會檢視自己的財務狀況？",
    options: [
      { text: "A. 很少", type: "C" },
      { text: "B. 每月一次", type: "B" },
      { text: "C. 有需要才看", type: "A" },
      { text: "D. 固定追蹤並調整", type: "D" }
    ]
  },
  {
    q: "7. 如果突然失業半年，你最擔心的是？",
    options: [
      { text: "A. 沒有生活費", type: "A" },
      { text: "B. 投資受到影響", type: "B" },
      { text: "C. 生活品質下降", type: "C" },
      { text: "D. 家庭與未來規劃被打亂", type: "D" }
    ]
  },
  {
    q: "8. 你認為保險最大的功能是？",
    options: [
      { text: "A. 有買就安心", type: "A" },
      { text: "B. 轉嫁重大風險", type: "B" },
      { text: "C. 別花太多錢就好", type: "C" },
      { text: "D. 是整體財務規劃的一部分", type: "D" }
    ]
  },
  {
    q: "9. 你比較認同哪一句話？",
    options: [
      { text: "A. 有錢要存起來", type: "A" },
      { text: "B. 錢要替我工作", type: "B" },
      { text: "C. 人生就是要享受", type: "C" },
      { text: "D. 財富是人生選擇的工具", type: "D" }
    ]
  },
  {
    q: "10. 看到朋友投資賺很多時，你會？",
    options: [
      { text: "A. 繼續照自己的步調", type: "A" },
      { text: "B. 去研究他怎麼做到的", type: "B" },
      { text: "C. 趕快跟進", type: "C" },
      { text: "D. 評估是否符合自己的目標", type: "D" }
    ]
  },
  {
    q: "11. 你目前最想改善的是？",
    options: [
      { text: "A. 存不到錢", type: "A" },
      { text: "B. 不知道怎麼投資", type: "B" },
      { text: "C. 收入不夠高", type: "C" },
      { text: "D. 財務沒有方向", type: "D" }
    ]
  },
  {
    q: "12. 如果只能選一個，你最想擁有？",
    options: [
      { text: "A. 一千萬存款", type: "A" },
      { text: "B. 每月十萬元被動收入", type: "B" },
      { text: "C. 可以自由旅行的生活", type: "C" },
      { text: "D. 完全不用為錢做決定的人生", type: "D" }
    ]
  },
  {
    q: "13. 你認為真正的財富是？",
    options: [
      { text: "A. 銀行存款", type: "A" },
      { text: "B. 能持續創造收入的資產", type: "B" },
      { text: "C. 想買什麼就買什麼", type: "C" },
      { text: "D. 有能力選擇自己的人生", type: "D" }
    ]
  },
  {
    q: "14. 對於貸款，你的看法是？",
    options: [
      { text: "A. 能不要借就不要借", type: "A" },
      { text: "B. 合理運用可以放大資產", type: "B" },
      { text: "C. 能讓生活更輕鬆就好", type: "C" },
      { text: "D. 要看用途與整體財務規劃", type: "D" }
    ]
  },
  {
    q: "15. 你希望五年後的自己是？",
    options: [
      { text: "A. 有足夠存款", type: "A" },
      { text: "B. 建立穩定投資收入", type: "B" },
      { text: "C. 過著自己喜歡的生活", type: "C" },
      { text: "D. 擁有完整的人生與財務藍圖", type: "D" }
    ]
  },
  {
    q: "16. 如果今天有一位專業人士願意免費陪你聊一小時，你最想討論的是？",
    options: [
      { text: "A. 如何存更多錢", type: "A" },
      { text: "B. 如何讓錢增值", type: "B" },
      { text: "C. 如何提升生活品質", type: "C" },
      { text: "D. 如何打造適合自己的人生與財務規劃", type: "D" }
    ]
  }
];

const results = {
  A: {
    title: "安全守成型",
    content: `
      <strong>你的核心特質：</strong><br>
      你重視安全感、穩定與風險控管。比起快速賺錢，你更在乎不要出錯。<br><br>
      <strong>優勢：</strong><br>
      不容易衝動投資，財務決策相對謹慎。<br><br>
      <strong>盲點：</strong><br>
      可能因為太保守，而錯過資產成長與現金流提升的機會。<br><br>
      <strong>建議方向：</strong><br>
      建立緊急預備金後，逐步學習資產配置與長期投資。
    `
  },
  B: {
    title: "成長投資型",
    content: `
      <strong>你的核心特質：</strong><br>
      你相信錢要替自己工作，願意學習投資，也願意承擔合理風險。<br><br>
      <strong>優勢：</strong><br>
      有資產成長意識，容易累積投資經驗。<br><br>
      <strong>盲點：</strong><br>
      容易過度追求報酬，忽略風險管理與現金流安全。<br><br>
      <strong>建議方向：</strong><br>
      建立投資紀律，並檢查保障、負債與現金流是否平衡。
    `
  },
  C: {
    title: "生活體驗型",
    content: `
      <strong>你的核心特質：</strong><br>
      你重視生活品質與當下感受，認為財富應該服務人生。<br><br>
      <strong>優勢：</strong><br>
      幸福感高，懂得享受成果，不會只為錢而活。<br><br>
      <strong>盲點：</strong><br>
      容易忽略儲蓄率、投資計畫與長期財務目標。<br><br>
      <strong>建議方向：</strong><br>
      保留生活品質，同時建立固定儲蓄與投資習慣。
    `
  },
  D: {
    title: "策略自由型",
    content: `
      <strong>你的核心特質：</strong><br>
      你重視人生選擇權，傾向從整體人生藍圖來看待財務。<br><br>
      <strong>優勢：</strong><br>
      有目標感，也願意做長期規劃。<br><br>
      <strong>盲點：</strong><br>
      有時想得太完整，反而行動速度變慢。<br><br>
      <strong>建議方向：</strong><br>
      把大目標拆成小行動，定期檢視現金流、保障與資產配置。
    `
  }
};

let currentQuestion = 0;
let scores = { A: 0, B: 0, C: 0, D: 0 };

function startQuiz() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQuestion];
  document.getElementById("questionTitle").innerText = q.q;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((option, index) => {
    optionsDiv.innerHTML += `
      <label class="option">
        <input type="radio" name="answer" value="${option.type}">
        ${option.text}
      </label>
    `;
  });
}

function nextQuestion() {
  const selected = document.querySelector('input[name="answer"]:checked');

  if (!selected) {
    alert("請先選擇一個答案");
    return;
  }

  scores[selected.value]++;

  currentQuestion++;

  if (currentQuestion < questions.length) {
    renderQuestion();
  } else {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("leadForm").classList.remove("hidden");
  }
}

function showResult() {
  const name = document.getElementById("name").value.trim();

  if (!name) {
    alert("請先填寫姓名");
    return;
  }

  let topType = "A";
  let maxScore = scores.A;

  for (let type in scores) {
    if (scores[type] > maxScore) {
      maxScore = scores[type];
      topType = type;
    }
  }

  document.getElementById("leadForm").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("resultTitle").innerText = results[topType].title;
  document.getElementById("resultContent").innerHTML = results[topType].content;

  console.log({
    name: document.getElementById("name").value,
    line: document.getElementById("line").value,
    phone: document.getElementById("phone").value,
    scores: scores,
    result: results[topType].title
  });
}

function bookConsult() {
  alert("請加入官方 LINE 或由工作人員協助安排 60 分鐘財富導航會談。");
}
</script>

</body>
</html>
